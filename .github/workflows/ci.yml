name: Django CI

on:
  push:
    branches: [ "semana5_optativa", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy application
      run: |
        echo "¡Todos los tests han pasado correctamente!"
        echo "Iniciando el despliegue de la aplicación..."
        # Aquí iría el comando real de despliegue, por ejemplo a Render:
        # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        echo "Despliegue simulado con éxito."
