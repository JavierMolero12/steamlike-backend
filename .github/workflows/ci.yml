name: Django CI/CD

on:
  push:
    branches: [ "semana6_optativa", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
        
    - name: Check pending migrations
      run: |
        python manage.py makemigrations --check --dry-run
        
    - name: Run tests with coverage
      env:
        SECRET_KEY: "ci-secret-key"
        DEBUG: "True"
        ALLOWED_HOSTS: "*"
        REDIS_URL: "redis://localhost:6379/1"
      run: |
        coverage run manage.py test
        coverage report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy application to Render
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_DEPLOY_HOOK" ]; then
          echo "WARNING: RENDER_DEPLOY_HOOK no está configurado. Saltando despliegue."
          exit 0
        fi
        echo "¡Todos los tests y comprobaciones han pasado!"
        echo "Iniciando el despliegue automático en Render..."
        curl -X POST $RENDER_DEPLOY_HOOK
        echo "Llamada al Deploy Hook completada."
